<!-- @if( !isLoading() ) { -->
	<nav class="docs-navbar-header" aria-label="Top Toolbar">
		<div style="flex: 1;justify-content: flex-start;">
			@for( fav of favoriteMenus(); track fav) {
				@if( fav["folderName"] ) {
					<mat-menu #favMenu="matMenu">
						@for( item of asFolder(fav).items; track item) {
							<a mat-menu-item [routerLink]=item.route routerLinkActive="folder-item-selected">{{item.name}}</a>
						}
					</mat-menu>
					<button mat-button [matMenuTriggerFor]="favMenu" class="docs-navbar-hide-small docs-button">
						{{fav["folderName"]}}
						<mat-icon>arrow_drop_down</mat-icon>
					</button>
				} @else {
					<a mat-button class="docs-navbar-hide-small docs-button"
						[routerLink]='$any(fav).route'
						[routerLinkActiveOptions]="{exact: true}"
						routerLinkActive="docs-navbar-header-item-selected">{{$any(fav).name}}</a>
				}
			}
		</div>
		<form>
  		<mat-form-field class="rounded-input search" appearance="outline" subscriptSizing="dynamic">
				<input matInput type=text class=search [formControl]=searchForm [matAutocomplete]=searchAC/>
				<mat-icon matPrefix>search</mat-icon>
				<mat-autocomplete #searchAC=matAutocomplete (optionSelected)="onSearchSelected($event.option.value)" (keypress.enter)="onSearch($event)">
					@for( suggestion of (searchValues() | async); track suggestion) {
						<mat-option [value]=suggestion>{{suggestion}}</mat-option>
					}
				</mat-autocomplete>
			</mat-form-field>
		</form>
		<div style="flex: 1;justify-content: flex-end; display: flex;align-items: center;">
			<authorization></authorization>
			<theme-picker></theme-picker>
			<favorites [favorites]=favorites() [existing]=existing() [name]=name() (onChange)="onFavoriteChange($event)"></favorites>
		</div>
	</nav>
	<nav class="docs-navbar docs-navbar-show-small" aria-label="Section Nav Bar">
		<div>foo</div>
		<!-- @for (key of sectionKeys; track key) {
			<a mat-button class="docs-navbar-link"
				[routerLink]="key">{{sections[key].name}}</a>
		} -->
	</nav>
