<ng-container>
	<mat-table #table [dataSource]=dataSource class="mat-elevation-z8" cdkDropList (cdkDropListDropped)="drop($event)" cdkDropListData=dataSource()>
		<ng-container matColumnDef="position" sticky>
			<mat-header-cell *matHeaderCellDef></mat-header-cell>
				<mat-cell *matCellDef="let element">
					@if( element.name != 'Selector' ){
						<mat-icon class="example-drag-cursor">reorder</mat-icon>
					}
					@else {
						<span></span>
					}
				</mat-cell>
		</ng-container>
		<ng-container matColumnDef="select">
			<mat-header-cell *matHeaderCellDef>Show</mat-header-cell>
			<mat-cell *matCellDef="let col">
				<mat-checkbox (click)="$event.stopPropagation()" (change)="col.displayed = !col.displayed" [checked]="col.displayed"></mat-checkbox>
			</mat-cell>
		</ng-container>
		<ng-container matColumnDef="name">
			<mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
			<mat-cell *matCellDef="let col">
				{{columnName(col)}}
			</mat-cell>
		</ng-container>

		<mat-header-row *matHeaderRowDef="columnNames; sticky: true"></mat-header-row>
		<mat-row mat-row *matRowDef="let element; columns: columnNames;" cdkDrag [cdkDragDisabled]="element.name == 'Selector'" [cdkDragData]="element" (click)="cellClick(element)" [class.highlight]="isSelected(element)"></mat-row>
