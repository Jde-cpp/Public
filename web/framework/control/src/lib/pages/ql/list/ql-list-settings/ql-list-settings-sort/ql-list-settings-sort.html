<mat-table #table [dataSource]="dataSource">
	<ng-container matColumnDef="active">
		<mat-header-cell *matHeaderCellDef> Column </mat-header-cell>
		<mat-cell *matCellDef="let element">
		  <mat-form-field subscriptSizing="dynamic">
				<!-- <input matInput type=text  [matAutocomplete]=auto [value]=element.active> -->
				<!-- <mat-autocomplete #auto="matAutocomplete" requireSelection (optionSelected)="addToSort(element, $event.option.value)"> -->
					<mat-select [value]="element.active" (selectionChange)="updateSort(element, $event.value)">
						@for( column of selectableFields(element) | keyvalue; track column.key) {
							<mat-option [value]=column.key>{{column.value}} </mat-option>
						}
					</mat-select>
				<!-- </mat-autocomplete> -->
			</mat-form-field>
		</mat-cell>
	</ng-container>
	<ng-container matColumnDef="direction">
		<mat-header-cell *matHeaderCellDef> Direction </mat-header-cell>
		<mat-cell *matCellDef="let element">
			<button matButton="tonal" (click)="onToggleDirection(element)">{{element.direction=="asc" ? 'Ascending' : 'Descending'}}</button>
		</mat-cell>
	</ng-container>
	<ng-container matColumnDef="delete">
		<mat-header-cell *matHeaderCellDef></mat-header-cell>
		<mat-cell *matCellDef="let element">
			@if( element.active != null ){
				<button matIconButton (click)="onDelete(element)">
					<mat-icon>delete</mat-icon>
				</button>
			}
		</mat-cell>
	</ng-container>
	<mat-header-row *matHeaderRowDef="['active', 'direction', 'delete']"></mat-header-row>
	<mat-row *matRowDef="let row; columns: ['active', 'direction', 'delete'];"></mat-row>
</mat-table>
