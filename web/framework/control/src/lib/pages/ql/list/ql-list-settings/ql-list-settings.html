<!-- @if( !isLoading() ) { -->
	<mat-toolbar>
		<mat-form-field>
			<input matInput [(ngModel)]="name" placeholder="View Name" (focus)="$event.target.select()">
		</mat-form-field>
		<button matButton="tonal" (click)="onSave.emit(getView(false))" [disabled]=disableSave()>Save</button>
		<button matButton="tonal" (click)="onShow.emit(getView(true))">Show</button>
    <button matButton="outlined" (click)="onDelete.emit(view())" [disabled]=disableSave()>Delete</button>
    <button matButton="outlined" (click)="onCancel.emit()">Cancel</button>
	</mat-toolbar>
	<mat-tab-group class="my-content" mat-align-tabs="center" mat-stretch-tabs="false"  [selectedIndex]="tabIndex()" (selectedIndexChange)="onTabIndexChanged($event)" dynamicHeight="true">
		<mat-tab>
			<ng-template mat-tab-label>Filter</ng-template>
			<div class="centered-content">
				<ql-list-settings-filter [view]=view() [columns]=columns() [schema]=schema() [excludedColumns]=excludedColumns() [suggestions]=suggestions()></ql-list-settings-filter>
			</div>
		</mat-tab>
		<mat-tab>
			<ng-template mat-tab-label>Display</ng-template>
			<div class="centered-content">
				<ql-list-settings-display [view]=view() [columns]=columns() [schema]=schema()></ql-list-settings-display>
			</div>
		</mat-tab>
		<mat-tab>
			<ng-template mat-tab-label>Sort</ng-template>
			<div class="centered-content">
				<ql-list-settings-sort [view]=view() [schema]="schema()" [excludedColumns]="excludedColumns()"></ql-list-settings-sort>
			</div>
		</mat-tab>
</mat-tab-group>
